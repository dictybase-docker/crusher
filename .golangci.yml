version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - funlen
    - funcorder
    - goconst
    - gocyclo
    - gosec
    - govet
    - gocognit
    - godoclint
    - intrange
    - ineffassign
    - importas
    - inamedparam
    - interfacebloat
    - lll
    - loggercheck
    - maintidx
    - misspell
    - mnd
    - modernize
    - nakedret
    - nestif
    - protogetter
    - revive
    - recvcheck
    - staticcheck
    - testifylint
    - unconvert
    - usestdlibvars
    - unparam
    - unused
    - whitespace
    - wsl_v5
  settings:
    funlen:
      lines: 120
      statements: 50
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - internal/baserow/
      - internal/k8s/
formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$